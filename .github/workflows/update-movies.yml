name: Update index.html from Movies.txt

on:
  push:
    paths:
      - "Movies.txt"
      - "update_html.py"
      - "rt_scraper.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-movies
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python test_scraper.py

      - name: Rebuild index.html
        run: python update_html.py

      - name: Commit results
        # Runs even when a scrape fails, so the movies that did succeed still
        # get published. The job still reports red so the failure is visible.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html movies.json img/movies
          git diff --cached --quiet || git commit -m "Auto-update index.html from Movies.txt"
          git push
